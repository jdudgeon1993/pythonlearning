<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Powerhouse Pro: Ultimate IDE</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>

    <style>
        :root {
            --bg: #fdfaf6; --surface: #f2efe4; --text: #3b3a36; --light: #7a756b;
            --green: #687a55; --green-soft: #e9ede4; --oak: #a67c52; 
            --term-bg: #2d2c29; --term-text: #e8e3d9; --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, sans-serif; color: var(--text); background-color: var(--bg);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background-image: linear-gradient(90deg, rgba(104,122,85,0.03) 50%, transparent 50%),
                              linear-gradient(rgba(104,122,85,0.03) 50%, transparent 50%);
            background-size: 20px 20px;
        }

        /* Header */
        header {
            background: var(--green); color: white; padding: 0.7rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--oak); z-index: 100;
        }
        .mode-toggle { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }

        /* Layout Main */
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebars */
        .sidebar { width: 280px; background: rgba(242,239,228,0.95); border-right: 2px solid var(--oak); display: flex; flex-direction: column; padding: 1rem; gap: 1rem; overflow-y: auto; }
        .sidebar-right { width: 300px; border-right: none; border-left: 2px solid var(--oak); }

        .card { background: white; border: 1px solid var(--oak); border-radius: 8px; padding: 0.8rem; margin-bottom: 0.5rem; }
        .card-h { font-size: 0.7rem; font-weight: 800; color: var(--green); margin-bottom: 5px; text-transform: uppercase; }

        /* Editor Area */
        .editor-wrap { flex: 1; display: flex; flex-direction: column; padding: 1rem; gap: 1rem; min-width: 0; }
        .ide-box { flex: 1; border: 2px solid var(--oak); border-radius: var(--radius); background: white; display: flex; flex-direction: column; overflow: hidden; }
        .CodeMirror { flex: 1; height: 100%; font-size: 14px; }

        /* Components */
        .btn { padding: 6px 15px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .btn-primary { background: var(--green); color: white; }
        .btn-ghost { background: transparent; border: 1px solid #ccc; color: var(--light); }

        .nav-item { padding: 8px; cursor: pointer; border-radius: 6px; font-size: 0.9rem; transition: 0.2s; display: flex; justify-content: space-between; }
        .nav-item:hover { background: var(--green-soft); }
        .nav-item.active { background: white; border-left: 4px solid var(--green); font-weight: bold; }

        .terminal { height: 180px; background: var(--term-bg); color: var(--term-text); padding: 1rem; font-family: monospace; overflow-y: auto; border-radius: var(--radius); border: 2px solid var(--oak); font-size: 13px; white-space: pre-wrap; }

        /* Inspector & Search */
        .inspector-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #eee; font-size: 0.8rem; }
        .var-name { color: var(--green); font-family: monospace; }
        .search-box { width: 100%; padding: 5px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:15px;">
            <h2 id="app-title" style="font-size: 1rem; letter-spacing: 1px;">PYTHON MASTERY PRO</h2>
            <div id="status" style="font-size: 0.7rem; opacity: 0.8;">Syncing WASM...</div>
        </div>
        <button id="toggle-mode" class="mode-toggle">Enter Sandbox</button>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div id="course-section">
                <div class="card-h">Curriculum</div>
                <div id="lesson-list"></div>
            </div>
            
            <div id="files-section" class="hidden">
                <div class="card-h">Project Files</div>
                <div id="file-list"></div>
                <button id="new-file-btn" class="btn btn-ghost" style="width:100%; margin-top:5px;">+ New File</button>
            </div>

            <div class="card" id="progress-card">
                <div class="card-h">Overall Progress</div>
                <div style="height:6px; background:#eee; border-radius:3px; overflow:hidden;">
                    <div id="progress-fill" style="height:100%; background:var(--green); width: 0%;"></div>
                </div>
            </div>
        </aside>

        <main class="editor-wrap">
            <div id="obj-card" class="card" style="background: var(--green-soft); border-left: 5px solid var(--green);">
                <div class="card-h">Current Objective</div>
                <p id="obj-text" style="font-size: 0.9rem;">Select a lesson to begin.</p>
            </div>

            <div class="ide-box">
                <div style="background:#f4f0e6; padding: 8px 15px; display:flex; justify-content:space-between; align-items:center;">
                    <span id="file-name-display" style="font-size: 0.7rem; font-weight:bold; color:var(--light);">main.py</span>
                    <div style="display:flex; gap:10px;">
                        <button id="run-btn" class="btn btn-ghost" disabled>Run</button>
                        <button id="submit-btn" class="btn btn-primary" disabled>Submit Challenge</button>
                    </div>
                </div>
                <textarea id="editor"></textarea>
            </div>

            <div class="terminal" id="terminal">Booting Python Engine...</div>
        </main>

        <aside class="sidebar sidebar-right">
            <div class="card">
                <div class="card-h">Variable Watcher</div>
                <div id="inspector-content" style="max-height: 200px; overflow-y:auto;">
                    <em style="font-size:0.7rem; color:var(--light);">Run code to inspect state.</em>
                </div>
            </div>

            <div class="card" style="flex:1; display:flex; flex-direction:column;">
                <div class="card-h">Quick Reference</div>
                <input type="text" id="doc-search" class="search-box" placeholder="Search functions (e.g. print)...">
                <div id="doc-results" style="font-size: 0.8rem; overflow-y:auto; flex:1;">
                    <p style="color:var(--light);">Start typing to find syntax help.</p>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // --- Curriculum & Data ---
        const lessons = [
            { id: 1, title: "The Variable", obj: "Create a variable named 'score' and set it to 10.", test: "assert score == 10", code: "score = " },
            { id: 2, title: "User Input", obj: "Ask for a name using input() and store it in 'user'.", test: "assert len(user) > 0", code: "user = " },
            { id: 3, title: "Math & Logic", obj: "Create 'total' which is 5 plus 5.", test: "assert total == 10", code: "" }
        ];

        const docLibrary = [
            { name: "print()", desc: "Outputs text to the console.", ex: "print('Hello World')" },
            { name: "input()", desc: "Gathers text from the user.", ex: "name = input('Name?')" },
            { name: "int()", desc: "Converts a string to a whole number.", ex: "age = int('25')" },
            { name: "len()", desc: "Returns the length of a string or list.", ex: "len('Hello') # 5" }
        ];

        let pyodide = null;
        let isSandbox = false;
        let currentFile = 'main.py';
        let virtualFS = { 'main.py': '# Welcome to the Sandbox\nprint("Hello World!")' };
        let unlocked = JSON.parse(localStorage.getItem('up_unlocked')) || [1];

        const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
            mode: "python", lineNumbers: true, autoCloseBrackets: true, matchBrackets: true
        });

        // --- Core Logic ---
        async function init() {
            pyodide = await loadPyodide({
                stdout: (t) => appendTerm(t),
                stderr: (t) => appendTerm(t, 'color:#ffab91')
            });
            await pyodide.runPythonAsync(`import builtins, js\ndef c_in(p=''): return js.prompt(p)\nbuiltins.input = c_in`);
            
            document.getElementById('status').textContent = "Engine Ready";
            document.getElementById('run-btn').disabled = false;
            document.getElementById('submit-btn').disabled = false;
            renderAll();
        }

        function appendTerm(msg, style='') {
            const term = document.getElementById('terminal');
            term.innerHTML += `<span style="${style}">${msg}</span>\n`;
            term.scrollTop = term.scrollHeight;
        }

        async function runPython(isSubmit = false) {
            const code = cm.getValue();
            if (isSandbox) virtualFS[currentFile] = code;
            
            appendTerm(`>>> Executing ${currentFile}...`, 'color:#888');
            try {
                await pyodide.runPythonAsync(code);
                updateInspector();
                if (isSubmit) validateChallenge();
            } catch (e) { appendTerm(e, 'color:#ffab91'); }
        }

        function updateInspector() {
            const content = document.getElementById('inspector-content');
            try {
                const globals = pyodide.globals.toJs();
                content.innerHTML = "";
                for (let [key, val] of globals) {
                    if (key.startsWith('_') || typeof val === 'function') continue;
                    content.innerHTML += `<div class="inspector-row"><span class="var-name">${key}</span><span>${val}</span></div>`;
                }
            } catch (e) { console.log(e); }
        }

        function validateChallenge() {
            const lesson = lessons.find(l => l.id === unlocked[unlocked.length-1]);
            try {
                pyodide.runPython(lesson.test);
                appendTerm("CHALLENGE COMPLETE!", "color:var(--green); font-weight:bold;");
                if (!unlocked.includes(lesson.id + 1) && lesson.id < lessons.length) {
                    unlocked.push(lesson.id + 1);
                    localStorage.setItem('up_unlocked', JSON.stringify(unlocked));
                    renderAll();
                }
            } catch (e) { appendTerm("Logic incorrect. Try again!", "color:#ffab91"); }
        }

        // --- UI Rendering ---
        function renderAll() {
            const lList = document.getElementById('lesson-list');
            lList.innerHTML = "";
            lessons.forEach(l => {
                const item = document.createElement('div');
                item.className = `nav-item ${!unlocked.includes(l.id) ? 'locked' : ''}`;
                item.innerHTML = `<span>Week ${l.id}</span> ${unlocked.includes(l.id) ? '✓' : '🔒'}`;
                if (unlocked.includes(l.id)) item.onclick = () => loadLesson(l.id);
                lList.appendChild(item);
            });

            const fList = document.getElementById('file-list');
            fList.innerHTML = "";
            Object.keys(virtualFS).forEach(f => {
                const item = document.createElement('div');
                item.className = `nav-item ${currentFile === f ? 'active' : ''}`;
                item.textContent = f;
                item.onclick = () => switchFile(f);
                fList.appendChild(item);
            });

            document.getElementById('progress-fill').style.width = (unlocked.length / lessons.length * 100) + "%";
        }

        function loadLesson(id) {
            const l = lessons.find(x => x.id === id);
            document.getElementById('obj-text').textContent = l.obj;
            cm.setValue(l.code);
        }

        function switchFile(name) {
            virtualFS[currentFile] = cm.getValue();
            currentFile = name;
            cm.setValue(virtualFS[name]);
            document.getElementById('file-name-display').textContent = name;
            renderAll();
        }

        // --- Events ---
        document.getElementById('toggle-mode').onclick = (e) => {
            isSandbox = !isSandbox;
            e.target.textContent = isSandbox ? "Exit Sandbox" : "Enter Sandbox";
            document.getElementById('course-section').classList.toggle('hidden');
            document.getElementById('obj-card').classList.toggle('hidden');
            document.getElementById('submit-btn').classList.toggle('hidden');
            document.getElementById('files-section').classList.toggle('hidden');
            document.getElementById('app-title').textContent = isSandbox ? "SANDBOX MODE" : "PYTHON MASTERY PRO";
            if (!isSandbox) loadLesson(unlocked[unlocked.length-1]);
        };

        document.getElementById('new-file-btn').onclick = () => {
            const name = prompt("File name (e.g. utils.py):");
            if (name) { virtualFS[name] = "# New Script"; switchFile(name); }
        };

        document.getElementById('doc-search').oninput = (e) => {
            const query = e.target.value.toLowerCase();
            const results = document.getElementById('doc-results');
            results.innerHTML = "";
            docLibrary.filter(d => d.name.includes(query)).forEach(d => {
                results.innerHTML += `<div style="margin-bottom:10px;"><strong>${d.name}</strong><br>${d.desc}<br><code style="background:#eee; padding:2px;">${d.ex}</code></div>`;
            });
        };

        document.getElementById('run-btn').onclick = () => runPython(false);
        document.getElementById('submit-btn').onclick = () => runPython(true);

        init();
    </script>
</body>
</html>
